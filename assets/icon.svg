<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Teams Phone Manager app icon: T-Pad monogram — dial-pad glyph with the dots
       forming a "T" (top row + center column) at full white, the remaining side
       dots dimmed. Geometry and palette mirror generate-icons.py / App.axaml
       BrandGradientBrush — keep in sync. -->
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B80EE"/>
      <stop offset="1" stop-color="#45478F"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#badge)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#sheen)"/>
  <g fill="#FFFFFF">
    <circle cx="353.3" cy="273.9" r="59.4"/><circle cx="512" cy="273.9" r="59.4"/><circle cx="670.7" cy="273.9" r="59.4"/>
    <circle cx="512" cy="432.6" r="59.4"/>
    <circle cx="512" cy="591.3" r="59.4"/>
    <circle cx="512" cy="750" r="59.4"/>
  </g>
  <g fill="#FFFFFF" opacity="0.38">
    <circle cx="353.3" cy="432.6" r="59.4"/><circle cx="670.7" cy="432.6" r="59.4"/>
    <circle cx="353.3" cy="591.3" r="59.4"/><circle cx="670.7" cy="591.3" r="59.4"/>
    <circle cx="353.3" cy="750" r="59.4"/><circle cx="670.7" cy="750" r="59.4"/>
  </g>
</svg>
