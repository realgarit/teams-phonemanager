<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Teams Phone Manager app icon: dial-pad glyph, optically centered.
       Geometry and palette mirror generate-icons.py / App.axaml BrandGradientBrush — keep in sync. -->
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6A6FDD"/>
      <stop offset="1" stop-color="#4B4D9E"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#badge)"/>
  <!-- 3x3 dots: cx 512, cy = 512 - gap/2 = 432.6, gap 158.7, r 59.4; bar at cy + 2*gap -->
  <g fill="#FFFFFF">
    <circle cx="353.3" cy="273.9" r="59.4"/><circle cx="512" cy="273.9" r="59.4"/><circle cx="670.7" cy="273.9" r="59.4"/>
    <circle cx="353.3" cy="432.6" r="59.4"/><circle cx="512" cy="432.6" r="59.4"/><circle cx="670.7" cy="432.6" r="59.4"/>
    <circle cx="353.3" cy="591.3" r="59.4"/><circle cx="512" cy="591.3" r="59.4"/><circle cx="670.7" cy="591.3" r="59.4"/>
    <rect x="293.9" y="690.6" width="436.2" height="118.8" rx="59.4"/>
  </g>
</svg>
