# .ai-review.conf
# Repo-level configuration for the AI review harness. Source this file
# from your CI workflow or pre-commit hook to set model preferences.
# All variables are optional — the harness falls back to defaults.
#
# Copy this file into your repo root and uncomment/configure the lines
# you need. The scripts source it if it exists; CI workflows can also
# set these as GitHub Actions variables instead.

# --- Model selection ---
# Which provider to use. Default: claude.
# AI_MODEL=claude

# --- Claude (default) ---
# No model variant to set — Claude Code CLI uses your subscription tier.

# --- OpenAI (ChatGPT) ---
# Model variant. Default: gpt-4o.
# OPENAI_MODEL=gpt-4o

# --- DeepSeek ---
# Model variant. Default: deepseek-chat.
# DEEPSEEK_MODEL=deepseek-chat

# --- Moonshot / Kimi ---
# Model variant. Default: moonshot-v1-8k.
# MOONSHOT_MODEL=moonshot-v1-8k

# --- Generic OpenAI-compatible responses API ---
# Base URL and model for services that expose the /responses endpoint
# (instead of /chat/completions).
# OPENAI_RESPONSES_BASE_URL=
# OPENAI_RESPONSES_MODEL=gpt-5.6-sol

# --- Prompt size guard (pre-commit only) ---
# Diff lines below this threshold skip the review unless the diff
# touches sensitive files. Default: 400.
# SIZE_THRESHOLD=400

# --- Timeout (pre-commit only, seconds) ---
# REVIEW_TIMEOUT_SECS=120