name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  create-tag:
    name: Create Tag from Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.get-version.outputs.tag }}
      # 'true' only when this run created the tag. Downstream release jobs are
      # gated on this so a plain push to main never rebuilds and overwrites the
      # assets of an existing release (that would break the Homebrew cask shas).
      created: ${{ steps.check-tag.outputs.exists == 'false' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Extract version from csproj
      id: get-version
      run: |
        VERSION=$(grep '<Version>' teams-phonemanager.csproj | sed -n 's/.*<Version>\([0-9.]*\)<\/Version>.*/\1/p' | head -1)
        TAG="v$VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"
        echo "Tag will be: $TAG"
    
    - name: Check if tag exists
      id: check-tag
      run: |
        TAG="${{ steps.get-version.outputs.tag }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Tag $TAG already exists, skipping tag creation"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Tag $TAG does not exist, will create it"
        fi
    
    - name: Import GPG key
      if: steps.check-tag.outputs.exists == 'false'
      uses: crazy-max/ghaction-import-gpg@v6
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.GPG_PASSPHRASE }}
        git_user_signingkey: true
        git_commit_gpgsign: true

    - name: Create and push tag
      if: steps.check-tag.outputs.exists == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.get-version.outputs.tag }}"
        git remote set-url origin https://${{ github.actor }}:${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git tag -s "$TAG" -m "Release $TAG"
        git push origin "$TAG"
        echo "Created and pushed tag: $TAG"

  build:
    name: Build ${{ matrix.runtime }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-tag
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.create-tag.outputs.created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64
          - os: ubuntu-latest
            runtime: linux-x64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Download PowerShell modules (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: ./Scripts/download-modules.ps1
    
    - name: Download PowerShell modules (macOS/Linux)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        chmod +x Scripts/download-modules.sh
        ./Scripts/download-modules.sh
    
    - name: Restore dependencies
      run: dotnet restore TeamsPhoneManager.slnx

    - name: Build
      run: dotnet build TeamsPhoneManager.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test teams-phonemanager.Tests/teams-phonemanager.Tests.csproj --configuration Release --no-build --verbosity normal

    - name: Publish
      # Self-contained so users need no .NET runtime install.
      # OutputType is set in the project (WinExe). It must NOT be passed as a global -p:OutputType,
      # because that propagates to the referenced class libraries and makes them fail with CS5001
      # (no Main).
      run: dotnet publish teams-phonemanager.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true --output ./publish/${{ matrix.runtime }}

    - name: Package (macOS .app bundle, ad-hoc signed)
      if: startsWith(matrix.runtime, 'osx-')
      env:
        VERSION: ${{ needs.create-tag.outputs.tag_name }}
      run: |
        chmod +x Scripts/package-macos.sh
        ./Scripts/package-macos.sh ./publish/${{ matrix.runtime }} "${VERSION#v}" ./dist
        ditto -c -k --keepParent "./dist/Teams Phone Manager.app" "./dist/teams-phonemanager-${{ matrix.runtime }}.zip"

    - name: Package (Windows zip + Inno Setup installer)
      if: matrix.runtime == 'win-x64'
      shell: pwsh
      env:
        VERSION: ${{ needs.create-tag.outputs.tag_name }}
      run: |
        New-Item -ItemType Directory -Force -Path ./dist | Out-Null
        Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./dist/teams-phonemanager-win-x64.zip
        $ver = $env:VERSION.TrimStart('v')
        iscc /DAppVersion=$ver /DPublishDir=..\..\publish\win-x64 /O.\dist installer\windows\teams-phonemanager.iss

    - name: Package (Linux zip)
      if: matrix.runtime == 'linux-x64'
      run: |
        mkdir -p ./dist
        chmod +x ./publish/linux-x64/teams-phonemanager
        cd ./publish/linux-x64
        zip -r ../../dist/teams-phonemanager-linux-x64.zip .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: teams-phonemanager-${{ matrix.runtime }}
        path: ./dist/*
        retention-days: 30

  create-release:
    name: Create Release
    needs: [create-tag, build]
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.create-tag.outputs.created == 'true'
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get tag name
      id: tag
      run: |
        TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "Creating release for tag: $TAG_NAME"
    
    - name: Download all artifacts
      # Build jobs upload finished assets (zips / setup exe), so a flat merge is enough.
      uses: actions/download-artifact@v4
      with:
        pattern: teams-phonemanager-*
        path: ./artifacts
        merge-multiple: true

    - name: List downloaded artifacts
      run: ls -lh artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@4634c16e79c963813287e889244c50009e7f0981 # v2.0.8
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        name: ${{ steps.tag.outputs.tag_name }}
        files: |
          artifacts/teams-phonemanager-win-x64.zip
          artifacts/teams-phonemanager-win-x64-setup.exe
          artifacts/teams-phonemanager-osx-x64.zip
          artifacts/teams-phonemanager-osx-arm64.zip
          artifacts/teams-phonemanager-linux-x64.zip
        fail_on_unmatched_files: true
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

  bump-homebrew-cask:
    name: Update Homebrew cask
    needs: [create-tag, create-release]
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.create-tag.outputs.created == 'true'
    steps:
    - name: Checkout tap
      uses: actions/checkout@v4
      with:
        repository: realgarit/homebrew-tap
        token: ${{ secrets.PAT_TOKEN }}

    - name: Regenerate cask
      env:
        TAG: ${{ needs.create-tag.outputs.tag_name }}
      run: |
        VERSION="${TAG#v}"
        BASE="https://github.com/realgarit/teams-phonemanager/releases/download/${TAG}"
        curl -fsSL -o arm64.zip "${BASE}/teams-phonemanager-osx-arm64.zip"
        curl -fsSL -o x64.zip   "${BASE}/teams-phonemanager-osx-x64.zip"
        SHA_ARM=$(sha256sum arm64.zip | cut -d' ' -f1)
        SHA_X64=$(sha256sum x64.zip   | cut -d' ' -f1)
        rm arm64.zip x64.zip
        mkdir -p Casks
        cat > Casks/teams-phonemanager.rb <<EOF
        cask "teams-phonemanager" do
          version "${VERSION}"

          on_arm do
            sha256 "${SHA_ARM}"
            url "https://github.com/realgarit/teams-phonemanager/releases/download/v#{version}/teams-phonemanager-osx-arm64.zip"
          end
          on_intel do
            sha256 "${SHA_X64}"
            url "https://github.com/realgarit/teams-phonemanager/releases/download/v#{version}/teams-phonemanager-osx-x64.zip"
          end

          name "Teams Phone Manager"
          desc "Microsoft Teams Phone System administration made simple"
          homepage "https://github.com/realgarit/teams-phonemanager"

          depends_on macos: ">= :monterey"

          app "Teams Phone Manager.app"

          # The app is ad-hoc signed (not notarized); clear quarantine so
          # Gatekeeper does not block the launch.
          postflight do
            system_command "/usr/bin/xattr",
                           args: ["-dr", "com.apple.quarantine", "#{appdir}/Teams Phone Manager.app"],
                           sudo: false
          end

          zap trash: [
            "~/Library/Preferences/ch.realgar.teams-phonemanager.plist",
          ]
        end
        EOF

    - name: Commit and push
      env:
        TAG: ${{ needs.create-tag.outputs.tag_name }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add Casks/teams-phonemanager.rb
        if git diff --cached --quiet; then
          echo "Cask unchanged, nothing to push"
        else
          git commit -m "teams-phonemanager ${TAG}"
          git push
        fi

  pr-validate:
    name: PR Validate ${{ matrix.runtime }}
    # Pre-merge gate: build + test + publish on every runtime, WITHOUT tagging or releasing.
    # The release jobs above are main-only, so without this a PR would have no CI to gate on.
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64
          - os: ubuntu-latest
            runtime: linux-x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore TeamsPhoneManager.slnx

    - name: Build
      run: dotnet build TeamsPhoneManager.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test teams-phonemanager.Tests/teams-phonemanager.Tests.csproj --configuration Release --no-build --verbosity normal

    - name: Publish (packaging smoke, not released)
      run: dotnet publish teams-phonemanager.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true --output ./publish/${{ matrix.runtime }}

    - name: Package smoke (macOS .app bundle)
      if: startsWith(matrix.runtime, 'osx-')
      run: |
        chmod +x Scripts/package-macos.sh
        ./Scripts/package-macos.sh ./publish/${{ matrix.runtime }} 0.0.0 ./dist
        ditto -c -k --keepParent "./dist/Teams Phone Manager.app" "./dist/teams-phonemanager-${{ matrix.runtime }}.zip"

    - name: Package smoke (Windows installer)
      if: matrix.runtime == 'win-x64'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ./dist | Out-Null
        iscc /DAppVersion=0.0.0 /DPublishDir=..\..\publish\win-x64 /O.\dist installer\windows\teams-phonemanager.iss
