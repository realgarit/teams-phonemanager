name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'release' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  release-please:
    name: Manage Release
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    
    steps:
    - name: Create or update release pull request
      id: release
      uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        config-file: release-please-config.json
        manifest-file: .release-please-manifest.json

  validate-release:
    name: Validate Release Version
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    outputs:
      tag_name: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout release tag
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.release-please.outputs.tag_name }}
        fetch-depth: 0

    - name: Match tag and project versions
      id: version
      env:
        RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      run: |
        set -euo pipefail
        if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Release tag '$RELEASE_TAG' is not a stable semantic version."
          exit 1
        fi

        VERSION="${RELEASE_TAG#v}"
        VERSION_FILE="$(tr -d '[:space:]' < version.txt)"
        if [[ "$VERSION_FILE" != "$VERSION" ]]; then
          echo "::error::version.txt contains '$VERSION_FILE', expected '$VERSION'."
          exit 1
        fi

        for PROPERTY in Version AssemblyVersion FileVersion; do
          PROJECT_VERSION="$(sed -n "s:.*<$PROPERTY>\\([^<]*\\)</$PROPERTY>.*:\\1:p" teams-phonemanager.csproj | head -1)"
          if [[ "$PROJECT_VERSION" != "$VERSION" ]]; then
            echo "::error::$PROPERTY is '$PROJECT_VERSION', expected '$VERSION'."
            exit 1
          fi
        done

        git fetch origin main
        if ! git merge-base --is-ancestor HEAD origin/main; then
          echo "::error::Release tag '$RELEASE_TAG' is not reachable from main."
          exit 1
        fi

        echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.runtime }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [release-please, validate-release]
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64
          - os: ubuntu-latest
            runtime: linux-x64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.validate-release.outputs.tag_name }}
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Download PowerShell modules (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: ./Scripts/download-modules.ps1
    
    - name: Download PowerShell modules (macOS/Linux)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        chmod +x Scripts/download-modules.sh
        ./Scripts/download-modules.sh
    
    - name: Restore dependencies
      run: dotnet restore TeamsPhoneManager.slnx

    - name: Build
      run: dotnet build TeamsPhoneManager.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test teams-phonemanager.Tests/teams-phonemanager.Tests.csproj --configuration Release --no-build --verbosity normal

    - name: Publish
      # Self-contained so users need no .NET runtime install.
      # OutputType is set in the project (WinExe). It must NOT be passed as a global -p:OutputType,
      # because that propagates to the referenced class libraries and makes them fail with CS5001
      # (no Main).
      run: dotnet publish teams-phonemanager.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true --output ./publish/${{ matrix.runtime }}

    - name: Import signing certificate (macOS)
      if: startsWith(matrix.runtime, 'osx-')
      env:
        P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
        P12_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        printf '%s' "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/signing.p12"
        export KEYCHAIN="$RUNNER_TEMP/tpm-ci.keychain-db"
        chmod +x Scripts/import-cert.sh
        Scripts/import-cert.sh "$RUNNER_TEMP/signing.p12"
        rm -f "$RUNNER_TEMP/signing.p12"
        echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

    - name: Package (macOS .app bundle, stable self-signed identity)
      if: startsWith(matrix.runtime, 'osx-')
      env:
        VERSION: ${{ needs.validate-release.outputs.version }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
        chmod +x Scripts/package-macos.sh
        SIGN_IDENTITY="Teams Phone Manager Self-Signed" \
          ./Scripts/package-macos.sh ./publish/${{ matrix.runtime }} "$VERSION" ./dist
        ditto -c -k --keepParent "./dist/Teams Phone Manager.app" "./dist/teams-phonemanager-${{ matrix.runtime }}.zip"

    - name: Package (Windows zip + Inno Setup installer)
      if: matrix.runtime == 'win-x64'
      shell: pwsh
      env:
        VERSION: ${{ needs.validate-release.outputs.version }}
      run: |
        New-Item -ItemType Directory -Force -Path ./dist | Out-Null
        Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./dist/teams-phonemanager-win-x64.zip
        iscc /DAppVersion=$env:VERSION /DPublishDir=..\..\publish\win-x64 /O.\dist installer\windows\teams-phonemanager.iss

    - name: Package (Linux zip)
      if: matrix.runtime == 'linux-x64'
      run: |
        mkdir -p ./dist
        chmod +x ./publish/linux-x64/teams-phonemanager
        cd ./publish/linux-x64
        zip -r ../../dist/teams-phonemanager-linux-x64.zip .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: teams-phonemanager-${{ matrix.runtime }}
        path: ./dist/*
        retention-days: 30

  upload-release-assets:
    name: Upload Release Assets
    needs: [release-please, validate-release, build]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      # Build jobs upload finished assets (zips / setup exe), so a flat merge is enough.
      uses: actions/download-artifact@v4
      with:
        pattern: teams-phonemanager-*
        path: ./artifacts
        merge-multiple: true

    - name: List downloaded artifacts
      run: ls -lh artifacts/

    - name: Generate SHA-256 manifest
      working-directory: artifacts
      run: sha256sum teams-phonemanager-* > SHA256SUMS

    - name: Attach assets to release
      uses: softprops/action-gh-release@4634c16e79c963813287e889244c50009e7f0981 # v2.0.8
      with:
        tag_name: ${{ needs.validate-release.outputs.tag_name }}
        files: |
          artifacts/teams-phonemanager-win-x64.zip
          artifacts/teams-phonemanager-win-x64-setup.exe
          artifacts/teams-phonemanager-osx-x64.zip
          artifacts/teams-phonemanager-osx-arm64.zip
          artifacts/teams-phonemanager-linux-x64.zip
          artifacts/SHA256SUMS
        fail_on_unmatched_files: true
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

  bump-homebrew-cask:
    name: Update Homebrew cask
    needs: [release-please, validate-release, upload-release-assets]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.release_created == 'true'
    steps:
    - name: Checkout tap
      uses: actions/checkout@v4
      with:
        repository: realgarit/homebrew-tap
        token: ${{ secrets.PAT_TOKEN }}

    - name: Regenerate cask
      env:
        TAG: ${{ needs.validate-release.outputs.tag_name }}
      run: |
        VERSION="${TAG#v}"
        BASE="https://github.com/realgarit/teams-phonemanager/releases/download/${TAG}"
        curl -fsSL -o arm64.zip "${BASE}/teams-phonemanager-osx-arm64.zip"
        curl -fsSL -o x64.zip   "${BASE}/teams-phonemanager-osx-x64.zip"
        SHA_ARM=$(sha256sum arm64.zip | cut -d' ' -f1)
        SHA_X64=$(sha256sum x64.zip   | cut -d' ' -f1)
        rm arm64.zip x64.zip
        mkdir -p Casks
        cat > Casks/teams-phonemanager.rb <<EOF
        cask "teams-phonemanager" do
          version "${VERSION}"

          on_arm do
            sha256 "${SHA_ARM}"
            url "https://github.com/realgarit/teams-phonemanager/releases/download/v#{version}/teams-phonemanager-osx-arm64.zip"
          end
          on_intel do
            sha256 "${SHA_X64}"
            url "https://github.com/realgarit/teams-phonemanager/releases/download/v#{version}/teams-phonemanager-osx-x64.zip"
          end

          name "Teams Phone Manager"
          desc "Microsoft Teams Phone System administration made simple"
          homepage "https://github.com/realgarit/teams-phonemanager"

          depends_on macos: :monterey

          app "Teams Phone Manager.app"

          # The app is ad-hoc signed (not notarized); clear quarantine so
          # Gatekeeper does not block the launch.
          postflight do
            system_command "/usr/bin/xattr",
                           args: ["-dr", "com.apple.quarantine", "#{appdir}/Teams Phone Manager.app"],
                           sudo: false
          end

          zap trash: [
            "~/Library/Preferences/ch.realgar.teams-phonemanager.plist",
          ]
        end
        EOF

    - name: Commit and push
      env:
        TAG: ${{ needs.validate-release.outputs.tag_name }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add Casks/teams-phonemanager.rb
        if git diff --cached --quiet; then
          echo "Cask unchanged, nothing to push"
        else
          git commit -m "teams-phonemanager ${TAG}"
          git push
        fi

  pr-validate:
    name: PR Validate ${{ matrix.runtime }}
    # Pre-merge gate: build + test + publish on every runtime without releasing.
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64
          - os: ubuntu-latest
            runtime: linux-x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore TeamsPhoneManager.slnx

    - name: Build
      run: dotnet build TeamsPhoneManager.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test teams-phonemanager.Tests/teams-phonemanager.Tests.csproj --configuration Release --no-build --verbosity normal

    - name: Publish (packaging smoke, not released)
      run: dotnet publish teams-phonemanager.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true --output ./publish/${{ matrix.runtime }}

    - name: Package smoke (macOS .app bundle)
      if: startsWith(matrix.runtime, 'osx-')
      run: |
        chmod +x Scripts/package-macos.sh
        ./Scripts/package-macos.sh ./publish/${{ matrix.runtime }} 0.0.0 ./dist
        ditto -c -k --keepParent "./dist/Teams Phone Manager.app" "./dist/teams-phonemanager-${{ matrix.runtime }}.zip"

    - name: Package smoke (Windows installer)
      if: matrix.runtime == 'win-x64'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ./dist | Out-Null
        iscc /DAppVersion=0.0.0 /DPublishDir=..\..\publish\win-x64 /O.\dist installer\windows\teams-phonemanager.iss
